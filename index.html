<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepCartel – Stockas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; }

  header { border-bottom: 1px solid #222; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); z-index: 100; }
  .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  .logo span { color: #c8a96e; }
  .status-badge { background: #1a1a1a; border: 1px solid #333; border-radius: 999px; padding: 6px 14px; font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .hero { padding: 3rem 2rem 2rem; text-align: center; }
  .hero h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.5rem; }
  .hero h1 span { color: #c8a96e; }
  .hero p { color: #888; font-size: 0.95rem; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 2rem 2rem; }
  .filter-btn { background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa; border-radius: 999px; padding: 7px 18px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: #c8a96e; color: #c8a96e; }
  .filter-btn.active { background: #c8a96e; border-color: #c8a96e; color: #0a0a0a; font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 0 2rem 3rem; max-width: 1100px; margin: 0 auto; }

  .card { background: #141414; border: 1px solid #222; border-radius: 14px; overflow: hidden; transition: transform 0.15s, border-color 0.15s; cursor: pointer; }
  .card:hover { transform: translateY(-3px); border-color: #c8a96e44; }
  .card-img { aspect-ratio: 1; background: #1c1c1c; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
  .card-badge { position: absolute; top: 10px; right: 10px; font-size: 11px; font-weight: 600; border-radius: 6px; padding: 3px 8px; }
  .badge-green { background: #0f3320; color: #4caf50; }
  .badge-yellow { background: #332800; color: #ffc107; }
  .badge-red { background: #330f0f; color: #f44336; }
  .card-body { padding: 14px; }
  .card-cat { font-size: 11px; color: #c8a96e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .card-name { font-size: 15px; font-weight: 600; color: #f0f0f0; margin-bottom: 4px; line-height: 1.3; }
  .card-size { font-size: 12px; color: #666; margin-bottom: 12px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-price { font-size: 18px; font-weight: 700; color: #c8a96e; }
  .card-stock { font-size: 12px; color: #555; }

  .order-btn { display: block; background: #c8a96e; color: #0a0a0a; text-align: center; font-weight: 700; font-size: 13px; border-radius: 8px; padding: 10px; margin: 12px 14px 14px; text-decoration: none; transition: opacity 0.15s; }
  .order-btn:hover { opacity: 0.85; }

  .empty { grid-column: 1/-1; text-align: center; padding: 4rem; color: #444; }
  .empty span { font-size: 3rem; display: block; margin-bottom: 1rem; }

  .contact-bar { background: #111; border-top: 1px solid #1e1e1e; padding: 1.5rem 2rem; text-align: center; }
  .contact-bar p { color: #555; font-size: 13px; }
  .contact-bar a { color: #c8a96e; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">Rep<span>Cartel</span></div>
  <div class="status-badge"><span class="dot"></span> Priimame užsakymus</div>
</header>

<div class="hero">
  <h1>Mūsų <span>Stockas</span></h1>
  <p>Visos prekės sandėlyje – greitas pristatymas po QC</p>
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

<div class="contact-bar">
  <p>Norėdami užsakyti – kreipkitės į mus per <a href="https://discord.gg/your-invite" target="_blank">Discord</a></p>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ČIA KEISK PREKES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const items = [
  // cat = kategorija, name = pavadinimas, size = dydžiai, price = kaina EUR
  // stock = kiekis (0 = išparduota), emoji = ikona, color = green/yellow/red
  { cat: "Batai", name: "Nike Air Force 1 Low", size: "EU 40–46", price: 65, stock: 8, emoji: "👟", color: "green" },
  { cat: "Batai", name: "Jordan 4 Retro", size: "EU 41–45", price: 85, stock: 3, emoji: "👟", color: "yellow" },
  { cat: "Batai", name: "New Balance 9060", size: "EU 40–44", price: 70, stock: 5, emoji: "👟", color: "green" },
  { cat: "Batai", name: "Adidas Samba OG", size: "EU 39–46", price: 60, stock: 0, emoji: "👟", color: "red" },
  { cat: "Drabužiai", name: "Stone Island Shadow Piece", size: "S / M / L / XL", price: 120, stock: 4, emoji: "🧥", color: "green" },
  { cat: "Drabužiai", name: "Essentials Hoodie", size: "S / M / L", price: 55, stock: 2, emoji: "👕", color: "yellow" },
  { cat: "Drabužiai", name: "Chrome Hearts Tee", size: "M / L / XL", price: 75, stock: 6, emoji: "👕", color: "green" },
  { cat: "Aksesuarai", name: "Louis Vuitton Piniginė", size: "Universalus", price: 90, stock: 3, emoji: "👜", color: "yellow" },
  { cat: "Aksesuarai", name: "Chrome Hearts Žiedas", size: "17 / 18 / 19mm", price: 45, stock: 7, emoji: "💍", color: "green" },
  { cat: "Aksesuarai", name: "Pandora Apyrankė", size: "17 / 19 / 21cm", price: 35, stock: 5, emoji: "📿", color: "green" },
  { cat: "Kvepalai", name: "Creed Aventus", size: "100ml", price: 55, stock: 2, emoji: "🌿", color: "yellow" },
  { cat: "Kvepalai", name: "Dior Sauvage", size: "100ml", price: 40, stock: 0, emoji: "🌿", color: "red" },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ČIA KEISK DISCORD NUORODĄ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DISCORD_LINK = "https://discord.gg/your-invite";

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NEKEISK ŽEMAu
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const stockLabel = { green: "Sandėlyje", yellow: "Mažai liko", red: "Išparduota" };
let active = "Visi";

function getCategories() {
  return ["Visi", ...new Set(items.map(i => i.cat))];
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = getCategories().map(c =>
    `<button class="filter-btn ${c === active ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join("");
}

function renderGrid() {
  const el = document.getElementById("grid");
  const filtered = active === "Visi" ? items : items.filter(i => i.cat === active);
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><span>📦</span>Šiuo metu nėra prekių šioje kategorijoje</div>`;
    return;
  }
  el.innerHTML = filtered.map(item => `
    <div class="card">
      <div class="card-img">
        ${item.emoji}
        <span class="card-badge badge-${item.color}">${item.stock > 0 ? stockLabel[item.color] : "Išparduota"}</span>
      </div>
      <div class="card-body">
        <div class="card-cat">${item.cat}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-size">${item.size}</div>
        <div class="card-footer">
          <span class="card-price">${item.price} €</span>
          <span class="card-stock">${item.stock > 0 ? `${item.stock} vnt.` : "–"}</span>
        </div>
      </div>
      ${item.stock > 0 ? `<a class="order-btn" href="${DISCORD_LINK}" target="_blank">Užsakyti per Discord</a>` : ''}
    </div>
  `).join("");
}

function setFilter(cat) {
  active = cat;
  renderFilters();
  renderGrid();
}

renderFilters();
renderGrid();
</script>
</body>
</html>
